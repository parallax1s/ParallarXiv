<!DOCTYPE html>
<html>
  <head>
    <title>ParallarXiv</title>
    <style>
      body {
        margin: 0;
        overflow-y: scroll;
        perspective: 1000px;
        height: 200vh;
        background: #000;
        color: #fff;
      }
      #viz {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 600px;
        height: 600px;
        transform-style: preserve-3d;
        transform: translate(-50%, -50%) rotateX(45deg);
      }
      path.slice {
        transform-origin: 50% 50%;
      }
    </style>
  </head>
  <body>
    <h1>Deployment OK</h1>
    <div id="viz"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script>
      function buildHierarchy(data) {
        const root = { name: 'root', children: [] };
        const lookup = {};
        for (const [topic, details] of Object.entries(data.topics)) {
          const topicNode = { name: topic, children: [] };
          lookup[topic] = { node: topicNode, cat: {} };
          root.children.push(topicNode);
          for (const [cat, subs] of Object.entries(details.categories)) {
            const catNode = { name: cat, children: [] };
            lookup[topic].cat[cat] = { node: catNode, sub: {} };
            topicNode.children.push(catNode);
            subs.forEach(sub => {
              const subNode = { name: sub, children: [] };
              lookup[topic].cat[cat].sub[sub] = subNode;
              catNode.children.push(subNode);
            });
          }
        }
        data.papers.forEach(p => {
          const subNode = lookup[p.topic].cat[p.category].sub[p.subcategory];
          if (subNode.children.length < 5) subNode.children.push({ name: p.title });
        });
        return root;
      }

      function renderSunburst(rootData) {
        const width = 600;
        const radius = width / 2;
        const container = d3.select('#viz');
        container.selectAll('*').remove();

        const svg = container
          .append('svg')
          .attr('viewBox', [-radius, -radius, width, width].join(' '))
          .style('width', width + 'px')
          .style('height', width + 'px')
          .style('transform-style', 'preserve-3d');

        const root = d3.hierarchy(rootData).sum(d => (d.children ? 0 : 1));
        d3.partition().size([2 * Math.PI, radius])(root);

        const color = d3.scaleOrdinal(
          d3.quantize(d3.interpolateRainbow, root.children.length + 1)
        );

        const arc = d3
          .arc()
          .startAngle(d => d.x0)
          .endAngle(d => d.x1)
          .innerRadius(d => d.y0)
          .outerRadius(d => d.y1);

        svg
          .selectAll('path')
          .data(root.descendants().filter(d => d.depth))
          .enter()
          .append('path')
          .attr('d', arc)
          .attr('class', 'slice')
          .style('fill', d => color((d.children ? d : d.parent).data.name))
          .style('stroke', '#000')
          .style('transform', d => `translateZ(${d.depth * 100}px)`);

        window.addEventListener('scroll', () => {
          const depth = window.scrollY;
          container.style(
            'transform',
            `translate(-50%, -50%) rotateX(45deg) translateZ(${-depth}px)`
          );
        });
      }

      fetch('papers.json')
        .then(r => r.json())
        .then(data => renderSunburst(buildHierarchy(data)))
        .catch(err => console.error(err));
    </script>
  </body>
</html>
