<!DOCTYPE html>
<html>
  <head>
    <title>ParallarXiv</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: sans-serif;
      }
      /* overlay removed */
    </style>
    <script src="https://unpkg.com/three@0.160.1/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.1/examples/js/controls/PointerLockControls.js"></script>
  </head>
  <body>
    <script>
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.y = 1.6; // approximate eye height

      const renderer = new THREE.WebGLRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const controls = new THREE.PointerLockControls(camera, renderer.domElement);

      // automatically lock pointer on page load
      controls.lock();

      const objects = []; // store balls
      const velocities = new Map();

      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();

      function spawnBall() {
        const geometry = new THREE.SphereGeometry(Math.random() * 0.5 + 0.2, 32, 32);
        const material = new THREE.MeshStandardMaterial({
          color: new THREE.Color(Math.random(), Math.random(), Math.random()),
        });
        const sphere = new THREE.Mesh(geometry, material);
        sphere.position.set(
          (Math.random() - 0.5) * 20,
          Math.random() * 4 + 1,
          (Math.random() - 0.5) * 20
        );
        scene.add(sphere);
        objects.push(sphere);
        velocities.set(sphere, new THREE.Vector3(
          (Math.random() - 0.5) * 0.02,
          (Math.random() - 0.5) * 0.02,
          (Math.random() - 0.5) * 0.02
        ));
      }

      // spawn balls periodically
      setInterval(spawnBall, 2000);

      // lighting
      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambient);
      const directional = new THREE.DirectionalLight(0xffffff, 0.5);
      directional.position.set(1, 1, 1);
      scene.add(directional);

      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();

        // update ball positions
        objects.forEach((obj) => {
          const v = velocities.get(obj);
          obj.position.addScaledVector(v, delta * 60); // approx 60fps scaling
          // simple bounds to keep balls near center
          if (obj.position.length() > 30) {
            obj.position.multiplyScalar(0.8);
          }
        });

        // WASD movement
        if (controls.isLocked === true) {
          const moveSpeed = 5 * delta;
          const direction = new THREE.Vector3();
          if (keys["w"]) direction.z -= moveSpeed;
          if (keys["s"]) direction.z += moveSpeed;
          if (keys["a"]) direction.x -= moveSpeed;
          if (keys["d"]) direction.x += moveSpeed;
          controls.moveRight(direction.x);
          controls.moveForward(direction.z);
        }

        renderer.render(scene, camera);
      }
      animate();

      const keys = {};
      window.addEventListener('keydown', (e) => {
        keys[e.key.toLowerCase()] = true;
      });
      window.addEventListener('keyup', (e) => {
        keys[e.key.toLowerCase()] = false;
      });

      function onClick(event) {
        if (!controls.isLocked) return;
        mouse.x = 0; // center of screen
        mouse.y = 0;
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(objects);
        if (intersects.length > 0) {
          const hit = intersects[0].object;
          scene.remove(hit);
          velocities.delete(hit);
          const index = objects.indexOf(hit);
          if (index > -1) objects.splice(index, 1);
        }
      }
      document.addEventListener('click', onClick);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
